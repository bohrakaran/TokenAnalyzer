services:
  # Backend Service
  - type: web
    name: token-analyzer-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false

  # Frontend Service
  - type: web
    name: token-analyzer-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: frontend/dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        sync: false
